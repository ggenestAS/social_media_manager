<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Prep — EXP automatismes — Post dérivée</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #212449; --paper: #faf6ee; --red-pen: #e7545b;
      --blue-pen: #2f6fb7; --sky: #71c0f3; --good: #2e9e83;
    }
    .bg-paper {
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, transparent 156px, var(--red-pen) 156px, var(--red-pen) 160px, transparent 160px),
        repeating-linear-gradient(to bottom, transparent, transparent 60px, rgba(33,36,73,0.09) 60px, rgba(33,36,73,0.09) 64px);
    }
    .display { font-family: 'Fraunces', serif; font-weight: 700; line-height: 1.05; color: var(--navy); }
    .display em { font-weight: 300; font-style: italic; color: var(--blue-pen); }
    .post-number, .brand-tag {
      font-family: 'Spline Sans Mono', monospace; font-size: 24px; font-weight: 600;
      letter-spacing: 0.1em; opacity: 0.42;
    }
    .brand-tag { text-transform: uppercase; opacity: 0.4; }

    body { margin: 0; padding: 0; background: #dedad2; }
    .screen { position: relative; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: var(--navy); }
    .inner { display: flex; flex-direction: column; height: 100%; padding: 72px 80px 80px 208px; }
    .head { display: flex; justify-content: space-between; align-items: baseline; }
    .body { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .foot { }

    .eyebrow { font-size: 64px; margin-bottom: 44px; }
    .context {
      font-family: 'Spline Sans Mono', monospace; font-weight: 500; font-size: 44px;
      color: var(--navy); opacity: 0.55; margin-bottom: 36px;
    }
    .hero-calc {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 168px;
      line-height: 0.95; letter-spacing: -0.04em; white-space: nowrap; color: var(--navy);
    }
    .hero-calc sup { font-size: 0.5em; vertical-align: super; }
    .method {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 72px;
      margin-top: 28px; color: var(--navy);
    }
    .method .ok { color: var(--good); }
    .method .dim { opacity: 0.45; }
    .prompt {
      font-family: 'Spline Sans Mono', monospace; font-size: 34px; font-weight: 500;
      opacity: 0.6; line-height: 1.4; padding-top: 36px; border-top: 2px solid rgba(33,36,73,0.16);
    }
  </style>
</head>
<body>

  <div data-screen-label="PostDerivee 4:5" class="screen bg-paper" style="width:1080px;height:1350px;">
    <div class="inner">
      <div class="head">
        <span class="post-number">EXP</span>
        <span class="brand-tag">Albert&nbsp;Prep</span>
      </div>
      <div class="body">
        <div class="display eyebrow">Le calcul caché<br>dans une <em>dérivée</em></div>
        <p class="context">f'(x) = 3x² &nbsp;→&nbsp; f'(4) =</p>
        <div class="hero-calc">3 × 4<sup>2</sup></div>
        <p class="method"><span class="dim">= 3 × 16 =</span> 48 <span class="ok">✓</span></p>
      </div>
      <div class="foot">
        <p class="prompt">Une dérivée se finit toujours par un calcul de tête. Tu mets combien de temps ? ↓</p>
      </div>
    </div>
  </div>

</body>
</html>
