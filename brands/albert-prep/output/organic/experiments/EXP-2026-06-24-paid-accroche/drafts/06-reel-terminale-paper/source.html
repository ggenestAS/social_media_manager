<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Prep — EXP paid-accroche — Reel paper Terminale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #212449; --paper: #faf6ee; --red-pen: #e7545b;
      --blue-pen: #2f6fb7; --good: #2e9e83;
      --grid-line: rgba(95, 130, 190, 0.13);
      --margin-rule: rgba(231, 84, 91, 0.38);
      --surface-sunken: rgba(33, 36, 73, 0.06);
    }
    body { margin: 0; background: #dedad2; }
    .reel {
      width: 1080px; height: 1920px; background: var(--paper); color: var(--navy);
      position: relative; overflow: hidden;
    }
    .reel::before {
      content: ''; position: absolute; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .reel::after {
      content: ''; position: absolute; top: 0; bottom: 0; left: 118px;
      width: 2px; background: var(--margin-rule); z-index: 1;
    }
    .inner {
      position: relative; z-index: 2; height: 100%;
      display: flex; flex-direction: column;
      padding: 100px 80px 120px 208px;
    }
    .head { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .body { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }
    .foot { flex-shrink: 0; }
    .brand-lockup { display: flex; align-items: center; gap: 14px; }
    .brand-lockup img { border-radius: 10px; display: block; }
    .brand-name {
      font-family: system-ui, sans-serif; text-transform: uppercase; color: var(--navy);
    }
    .brand-name strong { font-weight: 700; letter-spacing: 0.08em; font-size: 24px; }
    .brand-name span { font-weight: 300; letter-spacing: 0.26em; font-size: 24px; }
    .level-tag {
      font-family: 'Spline Sans Mono', monospace; font-size: 20px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--red-pen);
    }
    .speed-hook {
      font-family: 'Fraunces', serif; font-weight: 600; font-size: 48px;
      line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 36px; max-width: 760px;
    }
    .speed-hook em { font-style: italic; font-weight: 500; color: var(--blue-pen); }
    .hero-slot { position: relative; min-height: 140px; margin-bottom: 48px; }
    .hero-row {
      display: flex; align-items: center; flex-wrap: wrap; gap: 28px;
      font-family: 'Spline Sans Mono', monospace; font-variant-numeric: tabular-nums;
      font-weight: 600; font-size: 128px; line-height: 1;
    }
    .hero-row .times { font-size: 84px; }
    .sup { font-size: 68px; vertical-align: super; line-height: 0; }
    .hero-q { color: var(--red-pen); }
    .hero-ans {
      position: absolute; inset: 0; display: flex; align-items: center; gap: 20px;
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 160px;
      opacity: 0;
    }
    .answer-check { color: var(--good); font-size: 96px; }
    .timer-zone { display: flex; align-items: center; gap: 28px; }
    .timer-ring { position: relative; width: 200px; height: 200px; flex-shrink: 0; }
    .timer-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .timer-num {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 92px;
    }
    .timer-num span { position: absolute; }
    .timer-label {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 26px;
      letter-spacing: 0.04em; color: rgba(33, 36, 73, 0.55);
      background: var(--surface-sunken); padding: 14px 24px; border-radius: 999px;
    }
    .pain {
      font-family: 'Fraunces', serif; font-size: 38px; line-height: 1.14;
      letter-spacing: -0.01em; max-width: 760px; margin-bottom: 28px;
    }
    .pain em { font-style: italic; font-weight: 500; color: var(--blue-pen); }
    .prompt {
      font-family: 'Spline Sans Mono', monospace; font-size: 30px; font-weight: 500;
      opacity: 0.6; padding-top: 28px; border-top: 2px solid rgba(33, 36, 73, 0.14);
    }
    .handle {
      font-family: 'Spline Sans Mono', monospace; font-size: 26px; font-weight: 600;
      opacity: 0.4; margin-top: 24px;
    }
  </style>
</head>
<body>

  <!-- Paper reel = Terminale paid static on cahier. timer_sec: 5. Export: html:to-mp4 -->

  <div data-screen-label="ExpAccroche Paper Terminale T1 Reel 9:16" class="reel" style="width:1080px;height:1920px;" data-timer-sec="5">

    <div class="inner">
      <div class="head" data-anim="r_head">
        <div class="brand-lockup">
          <img src="../../../../../paid/campaigns/2026-06-18-meta/design-export/project/assets/logo-mark.svg" width="52" height="52" alt="Albert Prep">
          <span class="brand-name"><strong>Albert</strong> <span>Prep</span></span>
        </div>
        <span class="level-tag">Entrée en Terminale</span>
      </div>

      <div class="body">
        <div class="speed-hook" data-anim="r_hook">Tu sais le faire.<br>Mais en <em>combien de temps</em> ?</div>

        <div class="hero-slot">
          <div class="hero-row" data-anim="r_hero">
            <span>2<sup class="sup">3</sup></span>
            <span class="times">×</span>
            <span>2<sup class="sup">4</sup></span>
            <span>=</span>
            <span class="hero-q" data-anim="r_qmark">?</span>
          </div>
          <div class="hero-ans" data-anim="r_answer">
            <span>128</span>
            <span class="answer-check" data-anim="r_check">✓</span>
          </div>
        </div>

        <div class="timer-zone" data-anim="r_timer">
          <div class="timer-ring">
            <svg width="200" height="200" viewBox="0 0 200 200" aria-hidden="true">
              <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(33,36,73,0.1)" stroke-width="10"></circle>
              <circle cx="100" cy="100" r="86" fill="none" stroke="var(--red-pen)" stroke-width="10"
                      stroke-linecap="round" stroke-dasharray="540" data-ring></circle>
            </svg>
            <div class="timer-num"></div>
          </div>
          <span class="timer-label"><span class="js-timer-sec">5</span> secondes</span>
        </div>
      </div>

      <div class="foot" data-anim="r_foot">
        <p class="pain">En Terminale, comprendre ne suffit pas : reprends tes <em>réflexes</em> en 21 jours.</p>
        <p class="prompt">Pose ta réponse en commentaire ↓</p>
        <p class="handle" data-anim="r_handle">@albert.prep</p>
      </div>
    </div>
  </div>

  <script>
(function initReelTimeline() {
  const reel = document.querySelector('.reel[data-timer-sec]');
  if (!reel) return;
  const ALLOWED = [3, 5, 10, 15];
  let timerSec = parseInt(reel.dataset.timerSec, 10);
  if (!ALLOWED.includes(timerSec)) timerSec = 5;
  const INTRO = 2, REVEAL = 3, total = INTRO + timerSec + REVEAL;
  const revealStart = INTRO + timerSec;
  const loopS = total + 's';
  reel.dataset.loopMs = String(total * 1000);
  reel.dataset.ctaMs = String(Math.round((revealStart + REVEAL * 0.55) * 1000));
  reel.dataset.coverMs = String(Math.round((INTRO + 0.35) * 1000));
  const p = (sec) => ((sec / total) * 100).toFixed(3);
  const lines = [
    `@keyframes r_head{0%{opacity:0;transform:translateY(-8px)}${p(0.15)}%{opacity:1;transform:none}100%{opacity:1}}`,
    `@keyframes r_hook{0%,${p(0.08)}%{opacity:0;transform:translateY(10px)}${p(0.28)}%{opacity:1;transform:none}100%{opacity:1}}`,
    `@keyframes r_hero{0%,${p(0.12)}%{opacity:0;transform:scale(.94)}${p(0.32)}%{opacity:1;transform:scale(1)}${p(revealStart - 0.05)}%{opacity:1}${p(revealStart)}%{opacity:0}100%{opacity:0}}`,
    `@keyframes r_qmark{0%,${p(0.2)}%{opacity:0}${p(0.35)}%{opacity:1}${p(revealStart - 0.06)}%{opacity:1}${p(revealStart)}%{opacity:0}100%{opacity:0}}`,
    `@keyframes r_timer{0%,${p(INTRO * 0.4)}%{opacity:0}${p(INTRO * 0.55)}%{opacity:1}${p(revealStart - 0.08)}%{opacity:1}${p(revealStart)}%{opacity:0}100%{opacity:0}}`,
    `@keyframes r_ring{0%,${p(INTRO)}%{stroke-dashoffset:0}${p(revealStart)}%{stroke-dashoffset:540}100%{stroke-dashoffset:540}}`,
    `@keyframes r_foot{0%,${p(0.25)}%{opacity:0;transform:translateY(12px)}${p(0.45)}%{opacity:1;transform:none}100%{opacity:1}}`,
    `@keyframes r_answer{0%,${p(revealStart - 0.04)}%{opacity:0;transform:scale(.85)}${p(revealStart + 0.2)}%{opacity:1;transform:scale(1)}100%{opacity:1}}`,
    `@keyframes r_check{0%,${p(revealStart + 0.15)}%{opacity:0;transform:scale(.3)}${p(revealStart + 0.35)}%{opacity:1;transform:scale(1)}100%{opacity:1}}`,
    `@keyframes r_handle{0%,${p(revealStart + REVEAL * 0.5)}%{opacity:0}${p(revealStart + REVEAL * 0.65)}%{opacity:1}100%{opacity:1}}`
  ];
  for (let n = timerSec; n >= 1; n--) {
    const start = INTRO + (timerSec - n);
    const end = start + 1;
    lines.push(`@keyframes r_cd_${n}{0%,${p(start)}%{opacity:0}${p(start + 0.1)}%{opacity:1}${p(end - 0.1)}%{opacity:1}${p(end)}%,100%{opacity:0}}`);
  }
  document.getElementById('reel-timeline')?.remove();
  const style = document.createElement('style');
  style.id = 'reel-timeline';
  style.textContent = lines.join('\n');
  document.head.appendChild(style);
  const timerNumEl = reel.querySelector('.timer-num');
  if (timerNumEl) {
    timerNumEl.innerHTML = '';
    for (let n = timerSec; n >= 1; n--) {
      const span = document.createElement('span');
      span.textContent = String(n);
      span.style.animation = `r_cd_${n} ${loopS} linear infinite`;
      timerNumEl.appendChild(span);
    }
  }
  reel.querySelectorAll('.js-timer-sec').forEach((el) => { el.textContent = String(timerSec); });
  reel.querySelectorAll('[data-anim]').forEach((el) => {
    el.style.animation = `${el.dataset.anim} ${loopS} linear infinite`;
  });
  const ring = reel.querySelector('[data-ring]');
  if (ring) ring.style.animation = `r_ring ${loopS} linear infinite`;
})();
  </script>
</body>
</html>
