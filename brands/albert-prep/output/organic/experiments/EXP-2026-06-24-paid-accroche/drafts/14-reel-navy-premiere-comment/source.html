<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Prep — Comment reel navy Première 1% d'un milliard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #212449; --paper: #faf6ee; --red-pen: #e7545b;
      --blue-pen: #2f6fb7; --sky: #71c0f3; --good: #2e9e83;
      --grid-line: rgba(95, 130, 190, 0.13);
      --margin-rule: rgba(231, 84, 91, 0.38);
      --navy-grid: rgba(168, 219, 238, 0.05);
      --text-soft: rgba(33, 36, 73, 0.62);
      --surface-sunken: rgba(33, 36, 73, 0.06);
    }
    .frac { display: inline-flex; flex-direction: column; align-items: center; line-height: 0.92; }
    .frac-bar { border-top: 7px solid currentColor; margin-top: 8px; padding-top: 8px; }
    .sup { font-size: 0.55em; vertical-align: super; line-height: 0; }
    .hero-q, .eq-q { color: var(--red-pen); }
    .timer-ring { position: relative; width: 200px; height: 200px; flex-shrink: 0; }
    .timer-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
    .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 92px; }
    .timer-num span { position: absolute; }
    .timer-num--wide { font-size: 76px; }
    .timer-zone { display: flex; align-items: center; gap: 28px; margin-top: 8px; }
    .pain { font-family: 'Fraunces', serif; font-size: 38px; line-height: 1.14; letter-spacing: -0.01em; max-width: 760px; margin-bottom: 24px; }
    .pain em { font-style: italic; font-weight: 500; color: var(--blue-pen); }
    .cta-end {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 32px;
      letter-spacing: 0.02em; padding: 22px 40px; border-radius: 999px; margin-top: 8px;
    }
    .handle { font-family: 'Spline Sans Mono', monospace; font-size: 26px; font-weight: 600; opacity: 0.45; margin-top: 20px; }

    body { margin: 0; background: #111; }
    .reel { width: 1080px; height: 1920px; background: var(--navy); color: var(--paper); position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; padding: 140px 90px 140px; }
    .reel::before { content: ''; position: absolute; inset: 0; z-index: 0;
      background-image: linear-gradient(var(--navy-grid) 1px, transparent 1px), linear-gradient(90deg, var(--navy-grid) 1px, transparent 1px);
      background-size: 60px 60px; }
    .brand-wordmark { font-family: system-ui, sans-serif; text-transform: uppercase; color: var(--paper); }
    .brand-wordmark strong { font-weight: 700; letter-spacing: 0.08em; font-size: 36px; }
    .brand-wordmark span { font-weight: 300; letter-spacing: 0.26em; font-size: 36px; }
    .seg-label { font-family: 'Spline Sans Mono', monospace; font-weight: 700; font-size: 26px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sky); }
    .speed-hook { font-family: 'Fraunces', serif; font-weight: 600; font-size: 42px; line-height: 1.12; text-align: center; max-width: 820px; }
    .speed-hook em { font-style: italic; font-weight: 500; color: var(--sky); }
    .hero-row { display: flex; align-items: center; justify-content: center; gap: 28px; flex-wrap: wrap;
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 108px; line-height: 1; color: var(--paper); margin-bottom: 40px; }
    .hero-row .times { font-size: 0.65em; }
    .hero-compact { font-size: 72px; gap: 16px; }
    .pct { font-size: 0.55em; }
    .frac-bar { border-top-color: var(--paper); border-top-width: 6px; }
    .eq-q { color: var(--red-pen); font-size: 1.1em; }
    .timer-num { color: var(--paper); font-size: 110px; }
    .timer-ring { width: 220px; height: 220px; }
    .timer-label { font-family: 'Spline Sans Mono', monospace; font-size: 26px; opacity: 0.55; margin-top: 12px; }
    .foot-block { position: relative; z-index: 2; text-align: center; margin-top: auto; max-width: 860px; }
    .pain { color: var(--paper); font-size: 36px; margin-bottom: 28px; }
    .pain em { color: var(--sky); }
    .cta-end { background: rgba(250,246,238,0.12); color: var(--paper); justify-content: center; }
    .handle { color: var(--paper); text-align: center; }
  </style>
</head>
<body>
  <div data-screen-label="ExpAccroche Navy Premiere 1pctMilliard Comment Reel 9:16" class="reel" style="width:1080px;height:1920px;" data-timer-sec="5" data-comment-only="true">
    <div style="position:relative;z-index:2" data-anim="r_head">
      <span class="brand-wordmark"><strong>Albert</strong> <span>Prep</span></span>
    </div>
    <div style="position:relative;z-index:2;margin-top:36px" data-anim="r_hook"><span class="seg-label">Prêt pour la Spé Maths ?</span></div>
    
    <div style="position:relative;z-index:2;flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;">
      <div class="hero-row hero-compact" data-anim="r_hero">
        <span>1<span class="pct"> %</span></span>
        <span>d'un</span>
        <span>milliard</span>
        <span class="eq-q" data-anim="r_qmark">?</span>
      </div>
      <div class="timer-zone" data-anim="r_timer" style="flex-direction:column;align-items:center;">
        <div class="timer-ring">
          <svg width="220" height="220" viewBox="0 0 200 200" aria-hidden="true">
            <circle cx="100" cy="100" r="86" fill="none" stroke="rgba(168,219,238,0.16)" stroke-width="10"></circle>
            <circle cx="100" cy="100" r="86" fill="none" stroke="var(--sky)" stroke-width="10" stroke-linecap="round" stroke-dasharray="540" data-ring></circle>
          </svg>
          <div class="timer-num"></div>
        </div>
        <p class="timer-label"><span class="js-timer-sec">5</span> secondes</p>
      </div>
    </div>
    <div class="foot-block" data-anim="r_foot">
      <p class="pain">Si la réponse ne vient pas tout de suite, ce sont tes <em>automatismes</em> qui te ralentiront.</p>
      <span class="cta-end" data-anim="r_cta_end">↓ Pose ta réponse en commentaire</span>
      <p class="handle" data-anim="r_handle">@albert.prep</p>
    </div>
  </div>
  <script>(function initReelTimeline() {
  const reel = document.querySelector('.reel[data-timer-sec]');
  if (!reel) return;
  const ALLOWED = [3, 5, 10, 15];
  let timerSec = parseInt(reel.dataset.timerSec, 10);
  if (!ALLOWED.includes(timerSec)) timerSec = 10;
  const INTRO = 2, REVEAL = 3, total = INTRO + timerSec + REVEAL;
  const revealStart = INTRO + timerSec;
  const loopS = total + 's';
  reel.dataset.loopMs = String(total * 1000);
  reel.dataset.ctaMs = String(Math.round((revealStart + 0.2) * 1000));
  reel.dataset.coverMs = String(Math.round((INTRO + 0.35) * 1000));
  const p = (sec) => ((sec / total) * 100).toFixed(3);
  const lines = [
    `@keyframes r_head{0%{opacity:0;transform:translateY(-8px)}${p(0.15)}%{opacity:1;transform:none}100%{opacity:1}}`,
    `@keyframes r_hook{0%,${p(0.08)}%{opacity:0;transform:translateY(10px)}${p(0.28)}%{opacity:1;transform:none}100%{opacity:1}}`,
    `@keyframes r_hero{0%,${p(0.12)}%{opacity:0;transform:scale(.94)}${p(0.32)}%{opacity:1;transform:scale(1)}100%{opacity:1;transform:scale(1)}}`,
    `@keyframes r_qmark{0%,${p(0.2)}%{opacity:0}${p(0.35)}%{opacity:1}${p(revealStart)}%{opacity:1;transform:scale(1)}${p(revealStart + 0.15)}%{opacity:1;transform:scale(1.08)}${p(revealStart + 0.35)}%{opacity:1;transform:scale(1)}100%{opacity:1;transform:scale(1)}}`,
    `@keyframes r_timer{0%,${p(INTRO * 0.4)}%{opacity:0}${p(INTRO * 0.55)}%{opacity:1}${p(revealStart - 0.06)}%{opacity:1}${p(revealStart + 0.04)}%{opacity:0}100%{opacity:0}}`,
    `@keyframes r_ring{0%,${p(INTRO)}%{stroke-dashoffset:0}${p(revealStart)}%{stroke-dashoffset:540}100%{stroke-dashoffset:540}}`,
    `@keyframes r_foot{0%,${p(0.25)}%{opacity:0;transform:translateY(12px)}${p(0.45)}%{opacity:1;transform:none}100%{opacity:1}}`,
    `@keyframes r_cta_end{0%,${p(revealStart - 0.02)}%{opacity:0;transform:translateY(18px) scale(.96)}${p(revealStart + 0.18)}%{opacity:1;transform:none}100%{opacity:1}}`,
    `@keyframes r_handle{0%,${p(revealStart + REVEAL * 0.45)}%{opacity:0}${p(revealStart + REVEAL * 0.62)}%{opacity:1}100%{opacity:1}}`
  ];
  for (let n = timerSec; n >= 1; n--) {
    const start = INTRO + (timerSec - n);
    const end = start + 1;
    lines.push(`@keyframes r_cd_${n}{0%,${p(start)}%{opacity:0}${p(start + 0.1)}%{opacity:1}${p(end - 0.1)}%{opacity:1}${p(end)}%,100%{opacity:0}}`);
  }
  document.getElementById('reel-timeline')?.remove();
  const style = document.createElement('style');
  style.id = 'reel-timeline';
  style.textContent = lines.join('\n');
  document.head.appendChild(style);
  const timerNumEl = reel.querySelector('.timer-num');
  if (timerNumEl) {
    timerNumEl.innerHTML = '';
    for (let n = timerSec; n >= 1; n--) {
      const span = document.createElement('span');
      span.textContent = String(n);
      span.style.animation = `r_cd_${n} ${loopS} linear infinite`;
      if (n >= 10) span.classList.add('timer-num--wide');
      timerNumEl.appendChild(span);
    }
  }
  reel.querySelectorAll('.js-timer-sec').forEach((el) => { el.textContent = String(timerSec); });
  reel.querySelectorAll('[data-anim]').forEach((el) => {
    el.style.animation = `${el.dataset.anim} ${loopS} linear infinite`;
  });
  const ring = reel.querySelector('[data-ring]');
  if (ring) ring.style.animation = `r_ring ${loopS} linear infinite`;
})();</script>
</body></html>
