<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Prep — Calcul du jour #047</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #212449;
      --paper:    #faf6ee;
      --red-pen:  #e7545b;
      --blue-pen: #2f6fb7;
      --sky:      #71c0f3;
      --good:     #2e9e83;
      --gold:     #d9a13b;
    }

    .bg-paper {
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, transparent 78px, var(--red-pen) 78px, var(--red-pen) 80px, transparent 80px),
        repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 30px,
          rgba(33, 36, 73, 0.09) 30px,
          rgba(33, 36, 73, 0.09) 32px
        );
    }

    .slide {
      position: relative;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--navy);
    }

    .slide-portrait { width: 540px; height: 675px; }

    .display {
      font-family: 'Fraunces', serif;
      font-weight: 700;
      line-height: 1.1;
      color: var(--navy);
    }
    .display em {
      font-weight: 300;
      font-style: italic;
      color: var(--blue-pen);
    }

    body {
      background: #dedad2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 16px;
    }

    .slide-label {
      font-family: 'Spline Sans Mono', monospace;
      font-size: 11px;
      color: #888;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      align-self: flex-start;
    }

    .s1 {
      display: flex;
      flex-direction: column;
      padding: 28px 40px 32px 104px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .post-number {
      font-family: 'Spline Sans Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--navy);
      opacity: 0.40;
    }

    .brand-tag {
      font-family: 'Spline Sans Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--navy);
      opacity: 0.38;
    }

    .pillar-label { margin-top: 36px; margin-bottom: 40px; }

    .hero-calc {
      font-family: 'Spline Sans Mono', monospace;
      font-weight: 600;
      font-size: 100px;
      line-height: 1;
      color: var(--navy);
      letter-spacing: -0.025em;
    }

    .hero-result {
      font-family: 'Spline Sans Mono', monospace;
      font-weight: 600;
      font-size: 64px;
      line-height: 1;
      color: var(--red-pen);
      margin-top: 28px;
      letter-spacing: -0.02em;
    }

    .separator {
      width: 100%;
      max-width: 320px;
      height: 1px;
      background: var(--navy);
      opacity: 0.14;
      margin: 40px 0 20px;
    }

    .prompt {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      color: var(--navy);
      opacity: 0.60;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <p class="slide-label">Pilier 1 — Calcul du jour · Portrait 1080 × 1350 px (affiché à 50%)</p>

  <div class="slide slide-portrait bg-paper s1">

    <div class="top-bar">
      <span class="post-number">#047</span>
      <span class="brand-tag">Albert&nbsp;Prep</span>
    </div>

    <div class="pillar-label">
      <div class="display" style="font-size: 26px; letter-spacing: -0.01em;">
        Calcul <em>du jour</em>
      </div>
    </div>

    <div class="hero-calc">47 × 11</div>
    <div class="hero-result">= ?</div>

    <div class="separator"></div>

    <p class="prompt">💬 Pose ta réponse en commentaire</p>

  </div>

</body>
</html>
