<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Prep — Calcul du jour #054</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #212449; --paper: #faf6ee; --red-pen: #e7545b;
      --blue-pen: #2f6fb7; --sky: #71c0f3; --good: #2e9e83;
    }
    .bg-paper {
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, transparent 156px, var(--red-pen) 156px, var(--red-pen) 160px, transparent 160px),
        repeating-linear-gradient(to bottom, transparent, transparent 60px, rgba(33,36,73,0.09) 60px, rgba(33,36,73,0.09) 64px);
    }
    .bg-navy { background-color: var(--navy); color: var(--paper); }
    .display { font-family: 'Fraunces', serif; font-weight: 700; line-height: 1.05; color: var(--navy); }
    .display em { font-weight: 300; font-style: italic; color: var(--blue-pen); }
    .display.on-navy { color: var(--paper); }
    .display.on-navy em { color: var(--sky); }
    .post-number, .brand-tag {
      font-family: 'Spline Sans Mono', monospace; font-size: 24px; font-weight: 600;
      letter-spacing: 0.1em; opacity: 0.42;
    }
    .brand-tag { text-transform: uppercase; opacity: 0.4; }

    body { margin: 0; padding: 0; background: #dedad2; }
    .screen { position: relative; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: var(--navy); }
    /* 3-zone layout fills the full 1350px canvas: head / body(centered) / foot */
    .inner { display: flex; flex-direction: column; height: 100%; padding: 72px 80px 80px 208px; }
    .inner-navy { padding-left: 120px; color: var(--paper); }
    .head { display: flex; justify-content: space-between; align-items: baseline; }
    .body { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .foot { }

    .eyebrow { font-size: 60px; margin-bottom: 8px; }
    .hero-calc {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 180px;
      line-height: 0.95; letter-spacing: -0.04em; white-space: nowrap; color: var(--navy);
    }
    .bg-navy .hero-calc { color: var(--paper); }
    .hero-result {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 120px;
      line-height: 1; color: var(--red-pen); margin-top: 20px;
    }
    .prompt {
      font-family: 'Spline Sans Mono', monospace; font-size: 34px; font-weight: 500;
      opacity: 0.6; line-height: 1.4; padding-top: 36px; border-top: 2px solid currentColor;
    }
    .foot > .prompt { border-color: rgba(33,36,73,0.16); }
  </style>
</head>
<body>
  <div data-screen-label="Calcul 054 4:5" class="screen bg-paper" style="width:1080px;height:1350px;">
    <div class="inner">
      <div class="head">
        <span class="post-number">#054</span>
        <span class="brand-tag">Albert&nbsp;Prep</span>
      </div>
      <div class="body">
        <div class="display eyebrow">Calcul <em>du jour</em></div>
        <div class="hero-calc">996 + 1004</div>
        <div class="hero-result">= ?</div>
      </div>
      <div class="foot">
        <p class="prompt">Pose ta réponse en commentaire ↓</p>
      </div>
    </div>
  </div>
</body>
</html>
