<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Prep — Reel #015</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #212449; --paper: #faf6ee; --red-pen: #e7545b;
      --blue-pen: #2f6fb7; --sky: #71c0f3; --good: #2e9e83; --gold: #d9a13b;
    }
    @keyframes r_brand   { 0%{opacity:0;transform:translateY(-20px)} 4%{opacity:1;transform:none} 95%{opacity:1} 100%{opacity:0} }
    @keyframes r_eyebrow { 0%,3%{opacity:0;transform:translateY(24px)} 8%{opacity:1;transform:none} 92%{opacity:1} 97%{opacity:0} }
    @keyframes r_eq      { 0%,8%{opacity:1;transform:scale(1)} 44%{opacity:1} 46%{opacity:0;transform:scale(.96)} 100%{opacity:0} }
    @keyframes r_n3      { 0%,13%{opacity:0} 15%{opacity:1} 22%{opacity:1} 24%{opacity:0} 100%{opacity:0} }
    @keyframes r_n2      { 0%,24%{opacity:0} 26%{opacity:1} 32%{opacity:1} 34%{opacity:0} 100%{opacity:0} }
    @keyframes r_n1      { 0%,34%{opacity:0} 36%{opacity:1} 42%{opacity:1} 44%{opacity:0} 100%{opacity:0} }
    @keyframes r_qmark   { 0%,14%{opacity:1} 44%{opacity:1} 46%{opacity:0} 100%{opacity:0} }
    @keyframes r_answer  { 0%,45%{opacity:0;transform:scale(.4)} 51%{opacity:1;transform:scale(1.12)} 55%{opacity:1;transform:scale(1)} 100%{opacity:1;transform:scale(1)} }
    @keyframes r_check   { 0%,48%{opacity:0;transform:scale(.2) rotate(-25deg)} 54%{opacity:1;transform:scale(1) rotate(0)} 100%{opacity:1} }
    @keyframes r_reveal  { 0%,44%{opacity:0} 46%{opacity:1} 100%{opacity:1} }
    @keyframes r_handle  { 0%,68%{opacity:0;transform:translateY(28px)} 77%{opacity:1;transform:none} 100%{opacity:1} }

    body { margin: 0; padding: 0; background: #111; }
    .reel-num {
      font-family: 'Spline Sans Mono', monospace; font-size: 28px; font-weight: 600;
      letter-spacing: 0.12em; opacity: 0.4; text-transform: uppercase;
    }
    .eyebrow {
      font-family: 'Fraunces', serif; font-weight: 300; font-style: italic;
      font-size: 52px; color: var(--sky);
    }
    .hero-calc {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600;
      font-size: 180px; line-height: 1; letter-spacing: -0.03em;
    }
    .hero-q {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600;
      font-size: 120px; color: var(--red-pen); margin-top: 32px;
    }
    .countdown {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600;
      font-size: 320px; line-height: 1; position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .answer-hero {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600;
      font-size: 280px; line-height: 1; color: var(--navy);
    }
  </style>
</head>
<body>

  <!-- Question phase (navy) + countdown + answer (paper overlay) -->
  <div data-screen-label="Reel 015 9:16"
       style="width:1080px;height:1920px;background:var(--navy);color:var(--paper);position:relative;display:flex;flex-direction:column;align-items:center;padding:120px 80px;overflow:hidden;">

    <div style="position:relative;z-index:2;width:100%;animation:r_brand 8.5s linear infinite">
      <span class="reel-num">Reel #015</span>
    </div>

    <div style="position:relative;z-index:2;margin-top:80px;animation:r_eyebrow 8.5s linear infinite">
      <span class="eyebrow">Fais-le de tête</span>
    </div>

    <!-- Question + countdown layer -->
    <div style="position:relative;flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:40px;">

      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:r_eq 8.5s linear infinite">
        <div class="hero-calc">17 × 3</div>
        <div class="hero-q">= ?</div>
        <p style="font-family:'Spline Sans Mono',monospace;font-size:32px;opacity:0.55;margin-top:80px;animation:r_qmark 8.5s linear infinite">⏱ 3 secondes</p>
      </div>

      <!-- Countdown numbers -->
      <div style="position:absolute;inset:0;pointer-events:none;">
        <span class="countdown" style="color:var(--paper);animation:r_n3 8.5s linear infinite">3</span>
        <span class="countdown" style="color:var(--gold);animation:r_n2 8.5s linear infinite">2</span>
        <span class="countdown" style="color:var(--red-pen);animation:r_n1 8.5s linear infinite">1</span>
      </div>

      <!-- Answer reveal -->
      <div style="position:absolute;inset:0;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;animation:r_reveal 8.5s linear infinite">
        <p style="font-family:'Spline Sans Mono',monospace;font-size:48px;color:var(--navy);opacity:0.4;margin-bottom:48px;">17 × 3</p>
        <div style="width:480px;height:4px;background:var(--navy);opacity:0.12;margin-bottom:64px;"></div>
        <div style="display:flex;align-items:center;gap:32px;animation:r_answer 8.5s linear infinite">
          <span class="answer-hero">51</span>
          <span style="color:var(--good);font-size:120px;animation:r_check 8.5s linear infinite">✓</span>
        </div>
        <p style="font-family:'Spline Sans Mono',monospace;font-size:36px;color:var(--navy);opacity:0.55;margin-top:120px;animation:r_handle 8.5s linear infinite">@albertschool · Suis-nous ↑</p>
      </div>
    </div>
  </div>

</body>
</html>
