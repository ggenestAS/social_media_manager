<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Albert Prep — Calcul du jour #049</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300;1,9..144,700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #212449; --paper: #faf6ee; --red-pen: #e7545b;
      --blue-pen: #2f6fb7; --sky: #71c0f3; --good: #2e9e83;
    }
    .bg-navy { background-color: var(--navy); color: var(--paper); }
    .display { font-family: 'Fraunces', serif; font-weight: 700; line-height: 1.1; }
    .display em { font-weight: 300; font-style: italic; color: var(--sky); }
    body { margin: 0; padding: 0; background: #dedad2; }
    .screen { position: relative; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
    .s1 { display: flex; flex-direction: column; padding: 56px 80px 64px 120px; height: 100%; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; }
    .post-number, .brand-tag {
      font-family: 'Spline Sans Mono', monospace; font-size: 22px; font-weight: 600;
      letter-spacing: 0.1em; opacity: 0.45;
    }
    .brand-tag { font-size: 20px; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.4; }
    .pillar-label { margin-top: 72px; margin-bottom: 80px; }
    .hero-calc {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 220px;
      line-height: 1; letter-spacing: -0.025em;
    }
    .hero-result {
      font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 128px;
      line-height: 1; color: var(--red-pen); margin-top: 56px;
    }
    .separator { width: 100%; max-width: 640px; height: 2px; background: var(--paper); opacity: 0.14; margin: 80px 0 40px; }
    .prompt { font-size: 30px; opacity: 0.65; line-height: 1.4; }
  </style>
</head>
<body>
  <div data-screen-label="Calcul 049 4:5" class="screen bg-navy s1" style="width:1080px;height:1350px;">
    <div class="top-bar">
      <span class="post-number">#049</span>
      <span class="brand-tag">Albert&nbsp;Prep</span>
    </div>
    <div class="pillar-label">
      <div class="display" style="font-size:52px;">Calcul <em>du jour</em></div>
    </div>
    <div class="hero-calc">23²</div>
    <div class="hero-result">= ?</div>
    <div class="separator"></div>
    <p class="prompt">💬 Pose ta réponse en commentaire</p>
  </div>
</body>
</html>
